<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Animated background blobs -->
  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>
  <div class="bg-blob blob3"></div>

  <div class="card">

    <!-- Search Box -->
    <div class="search">
      <input type="text" placeholder="Search city..." spellcheck="false" id="cityInput">
      <button id="searchBtn" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
    </div>

    <!-- Error Message -->
    <div class="error" id="errorDiv">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <p>City not found. Please try again.</p>
    </div>

    <!-- Weather Section -->
    <div class="weather" id="weatherDiv">

      <div class="weather-icon-wrap">
        <div class="weather-icon" id="weatherIcon"></div>
        <div class="icon-glow"></div>
      </div>

      <h1 class="temp" id="temp">--°C</h1>
      <h2 class="city" id="city">--</h2>
      <p class="description" id="description">--</p>

      <div class="divider"></div>

      <!-- Weather Details -->
      <div class="details">
        <div class="col">
          <div class="col-icon humidity-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/>
            </svg>
          </div>
          <div class="text">
            <p class="humidity" id="humidity">--%</p>
            <p>Humidity</p>
          </div>
        </div>

        <div class="col">
          <div class="col-icon wind-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/>
            </svg>
          </div>
          <div class="text">
            <p class="wind" id="wind">-- km/h</p>
            <p>Wind Speed</p>
          </div>
        </div>
      </div>

      <!-- Extra info row -->
      <div class="details" style="margin-top: 12px;">
        <div class="col">
          <div class="col-icon feels-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
            </svg>
          </div>
          <div class="text">
            <p class="feels" id="feelsLike">--°C</p>
            <p>Feels Like</p>
          </div>
        </div>

        <div class="col">
          <div class="col-icon vis-icon">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </div>
          <div class="text">
            <p class="vis" id="visibility">-- km</p>
            <p>Visibility</p>
          </div>
        </div>
      </div>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
